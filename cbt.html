<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .login-box {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 360px;
      animation: slideUp 0.6s ease;
      display: none;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #0072ff;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #0072ff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #0072ff;
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover:not(:disabled) {
      background-color: #0057cc;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .message {
      color: white;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      padding: 20px;
      max-width: 400px;
      background-color: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      display: none;
    }

    .quiz-timer {
      position: absolute;
      top: 15px;
      left: 20px;
      color: white;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.2);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="quiz-timer" id="quizTimer">Quiz ends in: --:--</div>

  <div class="message" id="countdownMessage">⏳ Checking quiz start time...</div>

  <div class="login-box" id="loginBox">
    <h2>Quiz Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="loadBtn">Login</button>
    </form>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyoL5_Wuef_TKE882CTQfLcBeVpyEThOTA_yVQ9IpayeThqDj3DoA9Vy6wpP8CkWDZ5/exec";
    const loginBox = document.getElementById("loginBox");
    const messageBox = document.getElementById("countdownMessage");
    const quizTimer = document.getElementById("quizTimer");

    async function checkQuizStart() {
      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: JSON.stringify({ action: "getQuizTime" })
        });

        const result = await response.json();
        if (result.status === "success") {
          const { timestamp, start, end } = result.time;
          const refTime = new Date(timestamp);
          const startTime = new Date(refTime.getTime() + start * 60000);
          const endTime = new Date(refTime.getTime() + end * 60000);

          countdownToStart(startTime, endTime);
        } else {
          messageBox.textContent = "⚠️ Failed to get quiz time.";
          messageBox.style.display = "block";
        }
      } catch (err) {
        console.error("Error fetching quiz time:", err);
        messageBox.textContent = "⚠️ Error checking quiz time.";
        messageBox.style.display = "block";
      }
    }

    function countdownToStart(startTime, endTime) {
      const interval = setInterval(() => {
        const now = new Date();
        const msLeft = startTime - now;

        if (msLeft <= 0) {
          clearInterval(interval);
          messageBox.style.display = "none";
          loginBox.style.display = "block";
          startEndCountdown(endTime);
        } else {
          const mins = Math.floor(msLeft / 60000);
          const secs = Math.floor((msLeft % 60000) / 1000);
          messageBox.innerHTML = `⏳ Quiz will start shortly in ${mins}m ${secs}s.`;
          messageBox.style.display = "block";
        }
      }, 1000);
    }

    function startEndCountdown(endTime) {
      quizTimer.style.display = "block";
      const interval = setInterval(() => {
        const now = new Date();
        const msLeft = endTime - now;

        if (msLeft <= 0) {
          quizTimer.textContent = "⏱ Quiz has ended.";
          clearInterval(interval);
        } else {
          const mins = Math.floor(msLeft / 60000);
          const secs = Math.floor((msLeft % 60000) / 1000);
          quizTimer.textContent = `⏱ Quiz ends in: ${mins}m ${secs}s`;
        }
      }, 1000);
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const loadBtn = document.getElementById("loadBtn");
      localStorage.setItem("quizUser", username);

      loadBtn.disabled = true;
      loadBtn.textContent = 'loading ...';

      const response = await fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify({ action: "login", username, password }),
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
      });

      const result = await response.json();
      if (result.status === "success") {
        window.location.href = "cbt-dashboard.html";
      } else {
        alert("Invalid credentials.");
        loadBtn.disabled = false;
        loadBtn.textContent = 'Login';
      }
    });

    window.onload = checkQuizStart;
  </script>

</body>
</html>
